spring:
  application:
    name: virtual-card

  datasource:
    url: jdbc:postgresql://localhost:5432/vvcard
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: virtual-card
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: VirtualCardHikariPool

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: true
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

card:
  expiry:
    cron: "0 0 0 * * *"
    years: 5

logging:
  level:
    root: INFO
    com.virtual.card: DEBUG